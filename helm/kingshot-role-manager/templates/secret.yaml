{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kingshot-role-manager.secretName" . }}
  labels:
    {{- include "kingshot-role-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_TOKEN: {{ required "secret.discordToken is required when secret.create=true" .Values.secret.discordToken | quote }}
  DATABASE_HOST: {{ required "secret.database.host is required when secret.create=true" .Values.secret.database.host | quote }}
  DATABASE_PORT: {{ .Values.secret.database.port | toString | quote }}
  DATABASE_NAME: {{ required "secret.database.name is required when secret.create=true" .Values.secret.database.name | quote }}
  DATABASE_USER: {{ required "secret.database.user is required when secret.create=true" .Values.secret.database.user | quote }}
  DATABASE_PASSWORD: {{ required "secret.database.password is required when secret.create=true" .Values.secret.database.password | quote }}
{{- end }}
