{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kingshot-role-manager.secretName" . }}
  labels:
    {{- include "kingshot-role-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_TOKEN: {{ required "secret.discordToken is required" .Values.secret.discordToken | quote }}
  DATABASE_PASSWORD: {{ required "secret.database.password is required" .Values.secret.database.password | quote }}
{{- end }}
