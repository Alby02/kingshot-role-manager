replicaCount: 1

image:
  repository: ghcr.io/your-org/kingshot-role-manager
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

secret:
  create: true
  existingSecret: ""
  discordToken: ""
  database:
    host: ""
    port: "5432"
    name: kingshot_role_manager
    user: ""
    password: ""
