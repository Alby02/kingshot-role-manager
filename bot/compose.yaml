services:
  postgres:
    image: postgres:16-alpine
    container_name: kingshot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=kingshot_role_manager
      - POSTGRES_USER=kingshot
      - POSTGRES_PASSWORD=kingshot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kingshot-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=True
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  bot:
    build:
      context: .
      dockerfile: Containerfile
    image: kingshot-role-manager:latest
    container_name: kingshot-role-manager
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=kingshot_role_manager
      - DATABASE_USER=kingshot
      - DATABASE_PASSWORD=kingshot

volumes:
  postgres_data:
  pgadmin_data:
